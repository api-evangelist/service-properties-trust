name: Service Properties Trust
description: |
  Service Properties Trust (NASDAQ: SVC) is a real estate investment trust
  (REIT) with approximately $9.9 billion invested across two asset categories:
  service-focused retail net lease properties and hotels. As of March 31, 2026
  SVC owned 761 net lease properties (over 13.6 million sq ft) and 93 hotels
  (over 21,000 guest rooms) throughout the United States. The company is
  externally managed by The RMR Group (NASDAQ: RMR). SVC does not operate a
  public developer program and exposes no public APIs, OpenAPI specifications,
  SDKs, or webhooks; investor-facing endpoints are limited to SEC filings,
  press releases, email alerts, and end-of-day stock quotes.
